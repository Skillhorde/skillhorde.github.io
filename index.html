<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Abe's Gallery</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!--NAVIGATION-->
  <nav class="navbar">
  <div class="nav-links">
    <a href="index.html">Gallery</a>
    <a href="collections.html">Collections</a>
  </div>
</nav>

<section class="gallery">

  <!-- HERO / FIRST GALLERY IMAGE -->
  <div class="hero-gallery-item">
    <img src="photo1.jpeg" alt="Featured photograph" onclick="openLightbox(this.src)">
    <div class="hero-overlay">
      <h1>Abe Walters</h1>
      <p>Photography Gallery</p>
    </div>
  </div>

  <!-- REST OF GALLERY -->
  <img src="photo2.jpg" alt="Photograph 2" onclick="openLightbox(this.src)">
  <img src="photo3.jpg" alt="Photograph 3" onclick="openLightbox(this.src)">
  <img src="photo4.jpg" alt="Photograph 4" onclick="openLightbox(this.src)">
  <img src="photo5.jpg" alt="Photograph 5" onclick="openLightbox(this.src)">

</section>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script src="script.js"></script>

</body>
</html>
